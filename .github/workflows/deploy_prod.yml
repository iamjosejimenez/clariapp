name: Deploy Production

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote_and_deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Prepare prod branch
        id: promote
        run: |
          TARGET_SHA="$(git rev-parse origin/main)"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin prod >/dev/null 2>&1; then
            git checkout -B prod origin/prod
            git merge --ff-only "$TARGET_SHA"
          else
            git checkout -B prod "$TARGET_SHA"
          fi

          git push origin prod

      - name: Set up Docker Buildx for cache
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Runtime for cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > claria-production.pem
          chmod 600 claria-production.pem

      - name: Deploy prebuilt image
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          CLARIA_DATABASE_HOST: ${{ secrets.CLARIA_DATABASE_HOST }}
          CLARIA_DATABASE_PASSWORD: ${{ secrets.CLARIA_DATABASE_PASSWORD }}
          CLARIA_DATABASE_USER: ${{ secrets.CLARIA_DATABASE_USER }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APP_RELEASE: ${{ steps.promote.outputs.target_sha }}
        run: |
          kamal deploy --skip-push --version "${{ steps.promote.outputs.target_sha }}"
          kamal prune all -v
