name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    # For workflow_run only deploy when CI succeeded. For schedule/dispatch the
    # event has no workflow_run context, so this is always true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve target ref
        id: target
        run: |
          if [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0

      - name: Validate workflow_run commit is still current main
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          git fetch origin main --depth=1
          CURRENT_MAIN_SHA=$(git rev-parse origin/main)
          if [ "$CURRENT_MAIN_SHA" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "::error::The workflow_run head_sha '${{ github.event.workflow_run.head_sha }}' is not the current tip of origin/main ('$CURRENT_MAIN_SHA'). Aborting deploy."
            exit 1
          fi

      - name: Resolve deploy SHA
        id: deploy_sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Set up SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > claria-production.pem
          chmod 600 claria-production.pem

      - name: Deploy prebuilt image
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APP_RELEASE: ${{ steps.deploy_sha.outputs.sha }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
        run: |
          kamal deploy --skip-push --version "${{ steps.deploy_sha.outputs.sha }}"
          kamal prune all -v
