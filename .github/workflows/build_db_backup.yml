name: Build db-backup image

on:
  push:
    branches: [main]
    paths:
      - 'db-backup/**'
      - '.github/workflows/build_db_backup.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./db-backup
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/iamjosejimenez/claria-db-backup:latest
            ghcr.io/iamjosejimenez/claria-db-backup:${{ github.sha }}
          cache-from: type=gha,scope=db-backup
          cache-to: type=gha,scope=db-backup,mode=max
