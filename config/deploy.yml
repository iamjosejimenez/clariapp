# Name of your application. Used to uniquely configure containers.
service: claria

# Name of the container image. The registry server (ghcr.io) is prepended by
# Kamal from `registry.server`, so it must not be repeated here.
image: iamjosejimenez/claria

servers:
  web:
    hosts:
      - ssh.clariapp.com
    options:
      memory: "350m"
      memory-swap: "600m"
  jobs:
    hosts:
      - ssh.clariapp.com
    options:
      memory: "400m"
      memory-swap: "700m"
    cmd: bin/jobs
    proxy: false

proxy:
  ssl: false
  host: clariapp.com
  ssl_redirect: false
  forward_headers: true
  run:
    http_port: 8080
    https_port: 8443
    log_max_size: ""
    version: v0.9.2
    bind_ips:
      - 127.0.0.1
    options:
      cpus: 0.1
      memory: "64m"
      memory-swap: "128m"
# Credentials for your image host.
registry:
  server: ghcr.io
  username: iamjosejimenez
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - POSTGRES_PASSWORD
    - SECRET_KEY_BASE
    - RAILS_ENV
    - WEB_CONCURRENCY
    - PORT
    - OPENAI_API_KEY
    - SERPER_API_KEY
    - SENTRY_DSN
    - APP_RELEASE
    - GOOGLE_OAUTH_CLIENT_ID
    - GOOGLE_OAUTH_CLIENT_SECRET
    - GOOGLE_OAUTH_REDIRECT_URI
  clear:
    PORT: 80
    SOLID_QUEUE_IN_PUMA: false
    JOB_CONCURRENCY: 1
    WEB_CONCURRENCY: 0
    RAILS_MAX_THREADS: 3
    RAILS_ENV: production

    # App connects to the Postgres accessory over the Kamal Docker network.
    # The accessory is reachable as `claria-db` (service name + accessory name).
    DB_HOST: claria-db
    DB_PORT: 5432
    DB_NAME: claria_production
    DB_USER: claria

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

logging:
  driver: journald
  options:
    tag: "{{.Name}}"


# Use a persistent storage volume for local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "claria_storage:/rails/storage"


# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: arm64
  # Cache against a dedicated tag in the registry instead of GHA. The GHA cache
  # is capped at 10 GB and gets evicted between runs (so most builds missed it),
  # and mode=max exported every intermediate layer on each run (~16s overhead).
  # Registry-backed cache lives next to the pushed image, with no 10 GB cap.
  cache:
    type: registry
    image: iamjosejimenez/claria:build-cache-arm64
    options: mode=max

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: 3.4.2
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
ssh:
  user: ec2-user
  keys: [ "claria-production.pem" ]

deploy_timeout: 60

# Accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:17-alpine
    host: ssh.clariapp.com
    # Bind only to localhost so the port is not exposed publicly.
    # The app reaches the DB over the Kamal Docker network as `claria-db`.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: claria_production
        POSTGRES_USER: claria
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    options:
      memory: "512m"
      memory-swap: "768m"

  db-backup:
    image: ghcr.io/iamjosejimenez/claria-db-backup:latest
    host: ssh.clariapp.com
    env:
      clear:
        PGHOST: claria-db
        PGPORT: "5432"
        PGDATABASE: claria_production
        PGUSER: claria
        AWS_DEFAULT_REGION: us-west-2
        S3_BUCKET: claria-db-backups-534203180693-us-west-2-an
        BACKUP_RETENTION_DAYS: "7"
        BACKUP_WEEKLY_RETENTION: "4"
      secret:
        - POSTGRES_PASSWORD
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
    directories:
      - backups:/var/backups/postgres
    options:
      memory: "128m"
      memory-swap: "256m"
