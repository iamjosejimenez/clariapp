default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: claria_development
  username: claria
  host: localhost

test:
  <<: *default
  database: claria_test
  username: claria
  host: localhost

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
