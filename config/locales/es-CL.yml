es-CL:
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d de %b"
      long: "%-d de %B de %Y"
    month_names:
      - ""
      - "Enero"
      - "Febrero"
      - "Marzo"
      - "Abril"
      - "Mayo"
      - "Junio"
      - "Julio"
      - "Agosto"
      - "Septiembre"
      - "Octubre"
      - "Noviembre"
      - "Diciembre"
    abbr_month_names:
      - ""
      - "Ene"
      - "Feb"
      - "Mar"
      - "Abr"
      - "May"
      - "Jun"
      - "Jul"
      - "Ago"
      - "Sep"
      - "Oct"
      - "Nov"
      - "Dic"
  time:
    formats:
      default: "%d/%m/%Y %H:%M:%S"
      compact: "%d/%m/%Y %H:%M"
      short: "%d de %b, %H:%M"
      long: "%-d de %B de %Y, %H:%M"
  number:
    format:
      delimiter: "."
      separator: ","
    currency:
      format:
        unit: "$"
        delimiter: "."
        separator: ","
        precision: 0
        format: "%u %n"
